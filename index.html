<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Astro App</title>
  <meta name="theme-color" content="#0b1020">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <canvas id="starsCanvas"></canvas>

  <div class="app-shell">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden">←</button>
      <div class="brand">
        <div class="brand__logo">✦</div>
        <div>
          <div class="brand__title">Astro App</div>
          <div class="brand__subtitle">Нижняя навигация как в приложении</div>
        </div>
      </div>
      <button id="homeBtn" class="icon-btn hidden">⌂</button>
    </header>

    <main class="phone-frame">
      <section id="screen-home" class="screen active">
        <div class="hero-card glass">
          <div class="chip">Nav v2</div>
          <h1>Красивая нижняя навигация</h1>
          <p>Иконка сверху, подпись снизу — как в настоящем мобильном приложении.</p>
        </div>

        <div class="home-preview glass">
          <div class="home-preview__label">Быстрый просмотр профиля</div>
          <div id="homePreviewText" class="home-preview__value">Профиль ещё не заполнен</div>
        </div>

        <div class="grid-menu">
          <button class="menu-card glass" data-target="profile">
            <span class="menu-card__icon">👤</span>
            <span class="menu-card__title">Профиль</span>
            <span class="menu-card__text">Имя, дата рождения, код и число</span>
          </button>
          <button class="menu-card glass" data-target="forecast">
            <span class="menu-card__icon">🔮</span>
            <span class="menu-card__title">Прогноз</span>
            <span class="menu-card__text">Любовь, деньги, энергия</span>
          </button>
          <button class="menu-card glass" data-target="compatibility">
            <span class="menu-card__icon">💕</span>
            <span class="menu-card__title">Совместимость</span>
            <span class="menu-card__text">По двум датам рождения</span>
          </button>
          <button class="menu-card glass" data-target="lucky">
            <span class="menu-card__icon">🍀</span>
            <span class="menu-card__title">Счастливое число</span>
            <span class="menu-card__text">Число удачи на сегодня</span>
          </button>
          <button class="menu-card glass" data-target="history">
            <span class="menu-card__icon">📊</span>
            <span class="menu-card__title">История</span>
            <span class="menu-card__text">Последние действия в приложении</span>
          </button>
        </div>
      </section>

      <section id="screen-profile" class="screen">
        <div class="section-title">Профиль</div>
        <div class="glass form-card">
          <label>Имя</label>
          <input id="profileName" type="text" placeholder="Например: Анна">
          <label>Дата рождения</label>
          <input id="profileBirthdate" type="text" placeholder="24.11.1997">
          <div class="button-row">
            <button id="saveProfileBtn" class="primary-btn">Сохранить</button>
            <button id="deleteProfileBtn" class="danger-btn">Удалить</button>
          </div>
          <p id="profileMsg" class="note"></p>
        </div>

        <div id="profileView" class="hidden profile-card glass"></div>
      </section>

      <section id="screen-forecast" class="screen">
        <div class="section-title">Прогноз</div>
        <div class="glass form-card">
          <label>Дата рождения</label>
          <input id="forecastDate" type="text" placeholder="24.11.1997">
          <button id="forecastBtn" class="primary-btn">Показать прогноз</button>
          <p id="forecastMsg" class="note"></p>
        </div>
        <div id="forecastView" class="hidden result-stack"></div>
      </section>

      <section id="screen-compatibility" class="screen">
        <div class="section-title">Совместимость</div>
        <div class="glass form-card">
          <label>Первая дата</label>
          <input id="compatDate1" type="text" placeholder="24.11.1997">
          <label>Вторая дата</label>
          <input id="compatDate2" type="text" placeholder="13.03.1995">
          <button id="compatBtn" class="primary-btn">Посчитать</button>
          <p id="compatMsg" class="note"></p>
        </div>
        <div id="compatView" class="hidden result-stack"></div>
      </section>

      <section id="screen-lucky" class="screen">
        <div class="section-title">Счастливое число</div>
        <div class="glass form-card">
          <label>Дата рождения</label>
          <input id="luckyDate" type="text" placeholder="24.11.1997">
          <button id="luckyBtn" class="primary-btn">Узнать число</button>
          <p id="luckyMsg" class="note"></p>
        </div>
        <div id="luckyView" class="hidden result-stack"></div>
      </section>

      <section id="screen-history" class="screen">
        <div class="section-title">История</div>
        <div class="glass form-card">
          <div class="button-row">
            <button id="refreshHistoryBtn" class="secondary-btn">Обновить</button>
            <button id="clearHistoryBtn" class="danger-btn">Очистить историю</button>
          </div>
        </div>
        <div id="historyList" class="result-stack"></div>
      </section>
    </main>

    <nav class="bottom-nav glass">
      <button class="nav-btn active" data-target="home">
        <span class="nav-btn__icon">⌂</span>
        <span class="nav-btn__label">Главная</span>
      </button>
      <button class="nav-btn" data-target="profile">
        <span class="nav-btn__icon">👤</span>
        <span class="nav-btn__label">Профиль</span>
      </button>
      <button class="nav-btn" data-target="forecast">
        <span class="nav-btn__icon">🔮</span>
        <span class="nav-btn__label">Прогноз</span>
      </button>
      <button class="nav-btn" data-target="history">
        <span class="nav-btn__icon">📊</span>
        <span class="nav-btn__label">История</span>
      </button>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
